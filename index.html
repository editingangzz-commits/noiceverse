<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <title>Noiceverse Pro | Ultra Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red: #e50914; 
            --bg: #050505; 
            --card-bg: #111; 
            --text: #ffffff; 
            --glass: rgba(255, 255, 255, 0.1);
        }

        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            line-height: 1.4;
        }

        /* --- NAVIGATION --- */
        nav { 
            position: fixed; top: 0; width: 100%; z-index: 2000; padding: 15px 5%;
            display: flex; align-items: center; justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            transition: transform 0.3s, background 0.3s;
        }
        .nav-hidden { transform: translateY(-100%); }
        .nav-scrolled { background: #050505; border-bottom: 1px solid #222; padding: 10px 5%; }
        .logo { color: var(--red); font-weight: 900; font-size: 1.8rem; letter-spacing: -1.5px; cursor: pointer; }

        .search-container { position: relative; width: 45%; max-width: 300px; }
        .search-bar { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 10px 18px; border-radius: 50px; width: 100%; 
            font-size: 0.9rem; backdrop-filter: blur(10px);
        }

        .search-results-ext {
            position: absolute; top: 120%; right: 0; width: 200%; max-height: 400px;
            background: #161616; border-radius: 15px; overflow-y: auto; display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #333; z-index: 3000;
        }
        .res-item { display: flex; align-items: center; padding: 10px; gap: 12px; border-bottom: 1px solid #222; }
        .res-item img { width: 40px; height: 55px; border-radius: 4px; object-fit: cover; }
        .res-info h4 { font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- HERO --- */
        .hero {
            height: 80vh; display: flex; align-items: flex-end; padding: 0 5% 10% 5%;
            background-size: cover; background-position: center 20%; position: relative;
            transition: background-image 0.8s ease;
        }
        .hero::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, var(--bg) 10%, transparent 60%),
                        linear-gradient(to right, var(--bg) 0%, transparent 90%);
        }
        .hero-content { z-index: 10; width: 100%; transition: opacity 0.5s; }
        .hero-content h1 { font-size: clamp(2.2rem, 8vw, 4.5rem); font-weight: 900; margin-bottom: 20px; line-height: 1; letter-spacing: -1px; }

        .btn-group { display: flex; gap: 12px; }
        .btn {
            padding: 14px 32px; border-radius: 50px; font-weight: 700; border: none;
            cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s;
            font-size: 1rem;
        }
        .btn-play { background: #fff; color: #000; flex: 1; justify-content: center; max-width: 200px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-sec { background: rgba(255,255,255,0.15); color: #fff; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }

        /* --- ROWS --- */
        .section { padding: 40px 5% 0; }
        .section h2 { font-size: 1.4rem; margin-bottom: 15px; font-weight: 700; opacity: 0.9; }
        .row { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
        .card { min-width: 160px; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.05); z-index: 10; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }

        /* --- CINEMA PLAYER (PHONE OPTIMIZED) --- */
        #playerView { 
            display: none; position: fixed; inset: 0; background: #000; z-index: 5000; 
            flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        .video-container { 
            width: 100%; aspect-ratio: 16/9; background: #000; 
            position: sticky; top: 0; z-index: 100;
        }
        iframe { width: 100%; height: 100%; border: none; }
        
        .controls-overlay { padding: 20px; background: var(--bg); flex-grow: 1; min-height: 60vh; }
        .player-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #222; }
        
        .selector-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #555; margin: 15px 0 10px; font-weight: 800; }
        .selector { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; padding-bottom: 10px; }
        .sel-item { 
            padding: 12px 24px; background: #161616; border-radius: 50px; 
            font-size: 0.9rem; cursor: pointer; white-space: nowrap; border: 1px solid #333; transition: 0.2s;
        }
        .sel-item.active { background: var(--red); border-color: var(--red); color: #fff; font-weight: 700; box-shadow: 0 0 15px rgba(229, 9, 20, 0.3); }

        @media (min-width: 768px) {
            .card { min-width: 220px; }
            .search-results-ext { width: 100%; }
            .video-container { width: 85%; margin: 40px auto 20px; border-radius: 12px; overflow: hidden; position: relative; }
            .controls-overlay { padding: 0 10%; background: none; }
        }
    </style>
</head>
<body>

<nav id="navbar">
    <div class="logo" onclick="location.reload()">NOICEVERSE</div>
    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Quick search..." id="searchBox" autocomplete="off">
        <div class="search-results-ext" id="searchExt"></div>
    </div>
</nav>

<div id="home">
    <div class="hero" id="hero">
        <div class="hero-content" id="hContent">
            <h1 id="hTitle">...</h1>
            <div class="btn-group">
                <button class="btn btn-play" onclick="playHero()">▶ Play</button>
                <button class="btn btn-sec" onclick="alert('Added to My List!')">+</button>
            </div>
        </div>
    </div>
    
    <div class="section"><h2>Trending Now</h2><div class="row" id="mainRow"></div></div>
    <div class="section"><h2>Popular TV Shows</h2><div class="row" id="tvRow"></div></div>
</div>

<div id="playerView">
    <div class="video-container">
        <iframe id="player" allowfullscreen allow="autoplay; fullscreen"></iframe>
    </div>
    <div class="controls-overlay">
        <div class="player-header">
            <div>
                <h2 id="pTitle" style="font-size: 1.4rem; font-weight: 900;"></h2>
                <p id="pMeta" style="color: var(--red); font-size: 0.9rem; font-weight: 700; margin-top: 4px;"></p>
            </div>
            <button class="btn btn-sec" onclick="closePlayer()" style="padding: 10px 20px;">✕ Close</button>
        </div>
        <div id="tvUI" style="display:none;">
            <div class="selector-label">Seasons</div>
            <div class="selector" id="sRow"></div>
            <div class="selector-label">Episodes</div>
            <div class="selector" id="eRow"></div>
        </div>
    </div>
</div>

<script>
const KEY = "2bc67e60f9e19acc419050f32c477b39";
const API = "https://api.themoviedb.org/3";
const EMBED = "https://vidsrc.cc/v2/embed/";

let trending = [], heroIdx = 0, currID, currS = 1;

async function start() {
    try {
        const [tRes, tvRes] = await Promise.all([
            fetch(`${API}/trending/all/day?api_key=${KEY}`).then(r => r.json()),
            fetch(`${API}/tv/popular?api_key=${KEY}`).then(r => r.json())
        ]);
        trending = tRes.results.slice(0, 10);
        updateHero(trending[0]);
        renderRow(tRes.results, "mainRow");
        renderRow(tvRes.results, "tvRow", true);

        setInterval(() => {
            heroIdx = (heroIdx + 1) % trending.length;
            const content = document.getElementById('hContent');
            content.style.opacity = 0;
            setTimeout(() => {
                updateHero(trending[heroIdx]);
                content.style.opacity = 1;
            }, 500);
        }, 10000);
    } catch (e) { console.error("Initialization failed"); }
}

function updateHero(m) {
    document.getElementById('hero').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;
    document.getElementById('hTitle').innerText = m.title || m.name;
}

function renderRow(data, id, isTV = false) {
    const row = document.getElementById(id);
    row.innerHTML = data.map(m => `
        <div class="card" onclick="openPlayer(${m.id}, ${isTV || !!m.first_air_date}, '${(m.title || m.name).replace(/'/g, "")}')">
            <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" loading="lazy">
        </div>
    `).join('');
}

// SEARCH EXTENSION
const sBox = document.getElementById('searchBox');
const sExt = document.getElementById('searchExt');

sBox.oninput = async () => {
    if (sBox.value.length < 2) { sExt.style.display = 'none'; return; }
    const res = await fetch(`${API}/search/multi?api_key=${KEY}&query=${sBox.value}`).then(r => r.json());
    sExt.style.display = 'block';
    sExt.innerHTML = res.results.slice(0, 8).map(m => `
        <div class="res-item" onclick="openPlayer(${m.id}, ${m.media_type==='tv'}, '${(m.title||m.name).replace(/'/g, "")}')">
            <img src="https://image.tmdb.org/t/p/w92${m.poster_path || ''}">
            <div class="res-info"><h4>${m.title || m.name}</h4><p>${(m.media_type||'Result').toUpperCase()} • ${m.release_date || m.first_air_date || ''}</p></div>
        </div>
    `).join('');
};

document.addEventListener('click', (e) => { if (!e.target.closest('.search-container')) sExt.style.display = 'none'; });

// PLAYER LOGIC
async function openPlayer(id, isTV, title) {
    currID = id; sExt.style.display = 'none'; sBox.value = "";
    const pView = document.getElementById('playerView');
    pView.style.display = 'flex';
    pView.scrollTop = 0;
    document.getElementById('pTitle').innerText = title;
    document.body.style.overflow = "hidden";

    if(isTV) {
        document.getElementById('tvUI').style.display = 'block';
        const res = await fetch(`${API}/tv/${id}?api_key=${KEY}`).then(r => r.json());
        const seasons = res.seasons.filter(s => s.season_number > 0);
        document.getElementById('sRow').innerHTML = seasons.map(s => `
            <div class="sel-item ${s.season_number==1?'active':''}" onclick="loadEps(${s.episode_count}, ${s.season_number}, this)">Season ${s.season_number}</div>
        `).join('');
        loadEps(seasons[0].episode_count, 1);
    } else {
        document.getElementById('tvUI').style.display = 'none';
        document.getElementById('pMeta').innerText = "Movie";
        document.getElementById('player').src = `${EMBED}movie/${id}`;
    }
}

function loadEps(count, sNum, el) {
    currS = sNum;
    if(el) {
        document.querySelectorAll('#sRow .sel-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }
    let h = "";
    for(let i=1; i<=count; i++) h += `<div class="sel-item" onclick="playEp(${i}, this)">Ep ${i}</div>`;
    document.getElementById('eRow').innerHTML = h;
    playEp(1);
}

function playEp(eNum, el) {
    if(el) {
        document.querySelectorAll('#eRow .sel-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }
    document.getElementById('pMeta').innerText = `S${currS} • E${eNum}`;
    document.getElementById('player').src = `${EMBED}tv/${currID}/${currS}/${eNum}`;
}

function closePlayer() {
    document.getElementById('playerView').style.display = 'none';
    document.getElementById('player').src = "";
    document.body.style.overflow = "auto";
}

function playHero() {
    const h = trending[heroIdx];
    openPlayer(h.id, !!h.first_air_date, h.title || h.name);
}

// SMART NAV
let lastScroll = 0;
window.onscroll = () => {
    const nav = document.getElementById('navbar');
    const cur = window.pageYOffset;
    if (cur > 60) nav.classList.add('nav-scrolled');
    else nav.classList.remove('nav-scrolled');

    if (cur > lastScroll && cur > 400) nav.classList.add('nav-hidden');
    else nav.classList.remove('nav-hidden');
    lastScroll = cur;
};

start();
</script>
</body>
</html>
